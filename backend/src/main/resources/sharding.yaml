# ShardingSphere-JDBC：逻辑表 t_order → 分库分表
# 数据源：ds_0、ds_1（对应库 demo_sharding_0、demo_sharding_1）
# 分片键：user_id
# 分库：INLINE — ds_${user_id % 2}
# 分表：INLINE（与 OrderShardingConstants.USER_ID_BOUNDARY 一致；BOUNDARY_RANGE 仅可用于 autoTables，tables 规则须用标准算法）
# 共 2×2=4 个物理节点：ds_0.t_order_0、ds_0.t_order_1、ds_1.t_order_0、ds_1.t_order_1

dataSources:
  ds_0:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://127.0.0.1:3306/demo_sharding_0?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: 12345678
  ds_1:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://127.0.0.1:3306/demo_sharding_1?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: 12345678

rules:
  - !SHARDING
    defaultKeyGenerateStrategy:
      column: id
      keyGeneratorName: snowflake
    tables:
      t_order:
        actualDataNodes: ds_${0..1}.t_order_${0..1}
        databaseStrategy:
          standard:
            shardingColumn: user_id
            shardingAlgorithmName: order_database_inline
        tableStrategy:
          standard:
            shardingColumn: user_id
            shardingAlgorithmName: t_order_table_inline
    shardingAlgorithms:
      order_database_inline:
        type: INLINE
        props:
          algorithm-expression: ds_${user_id % 2}
      # 等价于 autoTables 下的 BOUNDARY_RANGE（单边界 10^9）：< 边界 → t_order_0，否则 → t_order_1
      t_order_table_inline:
        type: INLINE
        props:
          algorithm-expression: "t_order_${user_id < 1000000000 ? 0 : 1}"
    keyGenerators:
      snowflake:
        type: SNOWFLAKE

props:
  sql-show: true
